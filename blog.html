<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Dr. Nur Hidayah Binti Zainan</title>
  <meta name="description" content="Thoughts, essays, and articles on bioprocess engineering, green technology, and sustainability by Dr. Nur Hidayah Binti Zainan." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">Dr. <span>Hidayah</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="academics.html">Academics</a></li>
        <li><a href="students.html">Students</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="personal.html">Personal</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="page-banner">
    <div class="container">
      <h1>Blog</h1>
      <p class="banner-desc">Thoughts on bioprocess engineering, green technology, and the science of a sustainable future</p>
      <div class="underline-accent"></div>
    </div>
  </div>

  <!-- ===== BLOG LIST (auto-generated from blog-posts.js) ===== -->
  <section class="blog">
    <div class="container">
      <div class="blog-grid" id="blogGrid">
        <!-- Cards injected by JavaScript -->
      </div>
      <p id="blogEmpty" class="pub-count-info" style="display:none;">No blog posts yet. Check back soon!</p>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2025 Dr. Nur Hidayah Binti Zainan. All rights reserved.</p>
  </footer>

  <script src="blog-posts.js?v=3"></script>
  <script>
    (function renderBlogGrid() {
      const grid = document.getElementById('blogGrid');
      const empty = document.getElementById('blogEmpty');
      if (!grid) return;
      if (!Array.isArray(blogPosts) || blogPosts.length === 0) {
        if (empty) empty.style.display = 'block';
        return;
      }
      grid.innerHTML = blogPosts.map(p => `
        <article class="blog-card clay reveal">
          <a href="${p.file}" style="text-decoration:none; color:inherit;">
            <div class="blog-thumb"><span>${p.icon}</span></div>
          </a>
          <div class="blog-body">
            <div class="blog-meta">
              <span class="blog-tag">${p.tag}</span>
              <span class="blog-date">${p.date} &middot; ${p.readTime}</span>
            </div>
            <h2>${p.title}</h2>
            <p class="blog-excerpt">${p.excerpt}</p>
            <a href="${p.file}" class="blog-read-more">
              Read full article <span class="arrow">&rarr;</span>
            </a>
          </div>
        </article>
      `).join('');
    })();
  </script>
  <script src="script.js?v=3"></script>
</body>
</html>
