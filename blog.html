  <script src="blog-posts.js?v=5"></script>
  <script>
    (function renderBlogGrid() {
      const grid = document.getElementById('blogGrid');
      const empty = document.getElementById('blogEmpty');
      if (!grid) return;
      if (!Array.isArray(blogPosts) || blogPosts.length === 0) {
        if (empty) empty.style.display = 'block';
        return;
      }
      grid.innerHTML = blogPosts.map(p => `
        <article class="blog-card clay reveal">
          <a href="${p.file}" style="text-decoration:none; color:inherit;">
            <div class="blog-thumb"${p.heroStyle ? ' style="'+p.heroStyle+'"' : ''}><span>${p.icon}</span></div>
          </a>
          <div class="blog-body">
            <div class="blog-meta">
              <span class="blog-tag">${p.tag}</span>
              <span class="blog-date">${p.date} &middot; ${p.readTime}</span>
            </div>
            <h2>${p.title}</h2>
            <p class="blog-excerpt">${p.excerpt}</p>
            <a href="${p.file}" class="blog-read-more">
              Read full article <span class="arrow">&rarr;</span>
            </a>
          </div>
        </article>
      `).join('');
    })();
  </script>
  <script src="script.js?v=5"></script>
